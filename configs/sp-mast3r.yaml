# unique config: uses depth maps direclty extracted by matcher. here we match superpoint features with mast3r
defaults:
  - defaults/mast3r # see directory mpsfm/sfm/configs/defaults for more default configs

registration:
  use_prior_poses: true  # 启用先验外参
  pose_config_path: "/root/autodl-tmp/mpsfm/local/example/camera_poses.yaml"  # 外参配置文件路径